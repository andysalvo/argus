# Argus configuration
# Place this file at .github/argus.yml or argus.yml in your repo root.
# All settings are optional -- defaults review all supported AI instruction files.

version: 1

# Override which files to check (default: all patterns enabled)
# files:
#   include:
#     - "CLAUDE.md"
#     - "AGENTS.md"
